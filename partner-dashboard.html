<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>ダッシュボード｜やるゼ！ Partner</title>
<link rel="stylesheet" href="assets/style.css?v=20260421" />
<style>
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin: 8px 0 4px 0;
  }
  .metric {
    border: 1px solid var(--line, #e3e3e0);
    border-radius: 6px;
    padding: 14px 16px;
    background: #fff;
  }
  .metric__label {
    font-size: 12px;
    color: #666;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .metric__value {
    font-size: 24px;
    font-weight: 700;
    color: #0a0e1a;
    font-variant-numeric: tabular-nums;
  }
  .metric__unit {
    font-size: 12px;
    color: #666;
    font-weight: 400;
    margin-left: 4px;
  }
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 9000;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: #fff; border-radius: 8px; padding: 24px 28px;
    max-width: 460px; width: calc(100% - 32px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal h3 { margin: 0 0 16px 0; font-size: 16px; }
  .modal .modal-actions {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px;
  }
  .credentials-box {
    background: #fff8e1;
    border: 1px solid #f7c85c;
    border-radius: 6px;
    padding: 12px 14px;
    margin: 12px 0;
    font-size: 13px;
    line-height: 1.7;
  }
  .credentials-box .mono { font-weight: 700; font-size: 14px; }
  /* Phase 4-3a 按分率モーダル用追加スタイル */
  #shareModalWrap .modal { max-width: 520px; max-height: 90vh; overflow-y: auto; }
  .status-badge {
    display: inline-block; padding: 2px 8px; border-radius: 100px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  }
  .status-active     { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
  .status-pending    { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
  .status-expired    { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
</style>
</head>
<body>
<div id="adapt-header"></div>

<main class="container">
  <section class="page-intro">
    <p class="section-label">Partner Dashboard</p>
    <h1 id="pageTitle">ダッシュボード</h1>
    <p id="pageSubtitle">読み込み中…</p>
  </section>

  <div class="stack">

    <!-- サマリーメトリクス -->
    <section class="card">
      <h2 class="panel-title">サマリー</h2>
      <div id="summaryContent">
        <p class="muted">読み込み中…</p>
      </div>
    </section>

    <!-- 自分の情報 -->
    <section class="card">
      <h2 class="panel-title" id="selfInfoTitle">アカウント情報</h2>
      <table id="selfTbl"></table>
    </section>

    <!-- Reseller（Master Resellerのみ表示） -->
    <section class="card" id="subAgentsCard" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <h2 class="panel-title" style="margin:0;">Reseller</h2>
        <button class="btn btn--primary btn--sm" id="addAgentBtn" type="button">＋ Resellerを登録</button>
      </div>
      <div id="subAgentsContent"></div>
    </section>

    <!-- ご紹介先企業 -->
    <section class="card">
      <h2 class="panel-title">ご紹介先企業</h2>
      <div id="customersContent"></div>
    </section>

  </div>
</main>

<!-- Reseller登録モーダル -->
<div id="modalWrap" style="display:none;"></div>

<script src="assets/common.js?v=20260421"></script>
<script>
(async function () {
  // Resellerログインチェック
  const r = await Adapt.requirePartnerLogin('partner-login.html');
  if (!r) return;
  Adapt.renderPartnerHeader({ active: 'dashboard' });

  const p = r.partner;
  const isSuper = p.type === 'super';
  const roleLabel = isSuper ? 'Master Reseller' : 'Reseller';

  // タイトルとセクション見出しをユーザー種別に応じて動的にセット
  document.title = roleLabel + 'ダッシュボード｜やるゼ！';
  document.getElementById('pageTitle').textContent = roleLabel + 'ダッシュボード';
  document.getElementById('selfInfoTitle').textContent = roleLabel + '情報';

  document.getElementById('pageSubtitle').textContent =
    roleLabel + ' / ' + p.company_name;

  // --- 自分の情報テーブル ---
  document.getElementById('selfTbl').innerHTML = `
    <tr><th style="width:180px">${isSuper ? 'Master Resellerコード' : 'Resellerコード'}</th><td class="mono">${Adapt.escapeHTML(p.code)}</td></tr>
    <tr><th>種別</th><td>${isSuper ? 'Master Reseller' : 'Reseller'}</td></tr>
    <tr><th>会社名</th><td>${Adapt.escapeHTML(p.company_name)}</td></tr>
    <tr><th>ログインID</th><td class="mono">${Adapt.escapeHTML(p.login_id)}</td></tr>
    <tr><th>メール</th><td>${Adapt.escapeHTML(p.email || '-')}</td></tr>
    <tr><th>電話</th><td>${Adapt.escapeHTML(p.phone || '-')}</td></tr>
    <tr><th>契約開始日</th><td class="mono">${formatDate(p.contract_start_at)}</td></tr>
    <tr><th>契約終了予定日</th><td class="mono">${formatDate(p.contract_end_at)}</td></tr>
    ${p.parent ? `<tr><th>ご担当の Master Reseller</th><td><span class="mono">${Adapt.escapeHTML(p.parent.code)}</span> ${Adapt.escapeHTML(p.parent.company_name)}</td></tr>` : ''}
    ${isSuper && p.revenue_share_pct != null ? `<tr><th>按分率（タムジ→自社）</th><td class="mono">${p.revenue_share_pct}%</td></tr>` : ''}
  `;

  // --- サマリー取得 ---
  const summaryEl = document.getElementById('summaryContent');
  try {
    const s = await PartnerAPI.call('/api/partner/dashboard');
    const sm = s.summary;
    const ledger = sm.current_month_ledger;
    const metrics = [];
    metrics.push(`
      <div class="metric">
        <div class="metric__label">ご紹介先企業</div>
        <div class="metric__value">${sm.customer_count}<span class="metric__unit">社</span></div>
      </div>`);
    metrics.push(`
      <div class="metric">
        <div class="metric__label">有料契約中</div>
        <div class="metric__value">${sm.active_subscription_count}<span class="metric__unit">件</span></div>
      </div>`);
    if (isSuper && sm.sub_agent_count != null) {
      metrics.push(`
        <div class="metric">
          <div class="metric__label">Reseller</div>
          <div class="metric__value">${sm.sub_agent_count}<span class="metric__unit">社</span></div>
        </div>`);
    }
    if (isSuper && ledger) {
      metrics.push(`
        <div class="metric">
          <div class="metric__label">当月売上（${ledger.year_month}）</div>
          <div class="metric__value">¥${ledger.gross_amount.toLocaleString()}</div>
        </div>`);
      metrics.push(`
        <div class="metric">
          <div class="metric__label">当月支払予定（按分後）</div>
          <div class="metric__value">¥${ledger.share_amount.toLocaleString()}</div>
        </div>`);
    }
    summaryEl.innerHTML = `<div class="metric-grid">${metrics.join('')}</div>
      ${!isSuper ? '<p class="muted" style="font-size:12px; margin:10px 0 0 0;">売上情報はMaster Resellerから共有されます（タムジ社台帳は表示されません）。</p>' : ''}`;
  } catch (e) {
    summaryEl.innerHTML = `<div class="msg msg--err">サマリー取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
  }

  // --- Reseller一覧（Master Resellerのみ） ---
  if (isSuper) {
    document.getElementById('subAgentsCard').style.display = '';
    loadSubAgents();
    document.getElementById('addAgentBtn').addEventListener('click', openAddAgentModal);
  }

  async function loadSubAgents() {
    const el = document.getElementById('subAgentsContent');
    el.innerHTML = '<p class="muted">読み込み中…</p>';
    try {
      const r = await PartnerAPI.call('/api/partner/sub-agents');
      const list = r.sub_agents || [];
      if (list.length === 0) {
        el.innerHTML = `<p class="muted">まだResellerが登録されていません。右上の「＋ Resellerを登録」から追加してください。</p>`;
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr>
            <th>コード</th><th>会社名</th><th>ログインID</th><th>メール</th>
            <th>ご紹介先企業</th><th>按分率</th><th>契約終了</th><th>状態</th><th>操作</th>
          </tr></thead>
          <tbody>
            ${list.map(a => `
              <tr>
                <td class="mono">${Adapt.escapeHTML(a.code)}</td>
                <td>${Adapt.escapeHTML(a.company_name)}</td>
                <td class="mono">${Adapt.escapeHTML(a.login_id)}</td>
                <td>${Adapt.escapeHTML(a.email || '-')}</td>
                <td class="mono">${a.customer_count}社</td>
                <td class="mono">${a.share_pct != null ? a.share_pct + '%' : '-'}</td>
                <td class="mono">${formatDate(a.contract_end_at)}</td>
                <td>${statusLabel(a.status)}</td>
                <td>
                  ${a.status === 'active' ? `
                    <button class="btn btn--sm" data-agent-detail="${a.partner_id}" data-agent-company="${Adapt.escapeHTML(a.company_name)}" data-agent-code="${Adapt.escapeHTML(a.code)}">詳細</button>
                    <button class="btn btn--sm" data-share-edit="${a.partner_id}" data-share-pct="${a.share_pct ?? ''}" data-share-company="${Adapt.escapeHTML(a.company_name)}">按分率</button>
                    <button class="btn btn--sm" data-share-history="${a.partner_id}" data-share-company="${Adapt.escapeHTML(a.company_name)}">履歴</button>
                  ` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      // 按分率変更・履歴ボタン
      el.querySelectorAll('[data-share-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          openSubAgentShareEditModal({
            agentId: btn.dataset.shareEdit,
            companyName: btn.dataset.shareCompany,
            currentPct: btn.dataset.sharePct !== '' ? Number(btn.dataset.sharePct) : null,
            parentPct: p.revenue_share_pct
          });
        });
      });
      el.querySelectorAll('[data-share-history]').forEach(btn => {
        btn.addEventListener('click', () => {
          openSubAgentShareHistoryModal({
            agentId: btn.dataset.shareHistory,
            companyName: btn.dataset.shareCompany
          });
        });
      });
      // Phase 4-3e: Reseller詳細モーダル
      el.querySelectorAll('[data-agent-detail]').forEach(btn => {
        btn.addEventListener('click', () => {
          openSubAgentDetailModal({
            agentId: btn.dataset.agentDetail,
            agentCode: btn.dataset.agentCode,
            companyName: btn.dataset.agentCompany
          });
        });
      });
    } catch (e) {
      el.innerHTML = `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  }

  // --- ご紹介先企業一覧 ---
  let _customersCache = [];
  let _customersMeta = { my_code: '', is_super: false, sub_agent_codes: [] };
  (async function loadCustomers() {
    const el = document.getElementById('customersContent');
    el.innerHTML = '<p class="muted">読み込み中…</p>';
    try {
      const r = await PartnerAPI.call('/api/partner/customers');
      _customersCache = r.customers || [];
      _customersMeta = {
        my_code: r.my_code,
        is_super: r.is_super,
        sub_agent_codes: r.sub_agent_codes || []
      };
      renderCustomers('all');
    } catch (e) {
      el.innerHTML = `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  })();

  function renderCustomers(filter) {
    const el = document.getElementById('customersContent');
    const full = _customersCache;
    if (full.length === 0) {
      el.innerHTML = `<p class="muted">ご紹介先企業はまだいません。Resellerコードを案内して登録してもらってください。</p>`;
      return;
    }
    // フィルタ適用
    let list = full;
    if (filter === 'direct') list = full.filter(c => c.partner_code === _customersMeta.my_code);
    else if (filter && filter !== 'all') list = full.filter(c => c.partner_code === filter);

    // フィルタドロップダウン（super のみ表示）
    let filterUI = '';
    if (_customersMeta.is_super) {
      const options = [
        `<option value="all"${filter === 'all' ? ' selected' : ''}>すべて (${full.length})</option>`,
        `<option value="direct"${filter === 'direct' ? ' selected' : ''}>直販のみ (${full.filter(c => c.partner_code === _customersMeta.my_code).length})</option>`
      ];
      for (const sa of _customersMeta.sub_agent_codes) {
        const n = full.filter(c => c.partner_code === sa.code).length;
        options.push(`<option value="${Adapt.escapeHTML(sa.code)}"${filter === sa.code ? ' selected' : ''}>${Adapt.escapeHTML(sa.code)} ${Adapt.escapeHTML(sa.company_name)} (${n})</option>`);
      }
      filterUI = `
        <div style="margin-bottom:8px;display:flex;align-items:center;gap:8px;">
          <label style="font-size:12px;color:#666;">フィルタ：</label>
          <select id="customerFilter" style="padding:4px 8px;font-size:12px;">
            ${options.join('')}
          </select>
          <span style="font-size:11px;color:#999;">${list.length}社 表示中</span>
        </div>`;
    }

    el.innerHTML = `
        ${filterUI}
        <table>
          <thead><tr>
            <th>会社ID</th><th>会社名</th><th>メール</th>
            <th>パートナーコード</th><th>スタッフ数</th><th>有料契約</th><th>登録日</th>
          </tr></thead>
          <tbody>
            ${list.map(c => {
              const isDirect = c.partner_code === _customersMeta.my_code;
              return `
              <tr>
                <td class="mono">${Adapt.escapeHTML(c.company_id)}</td>
                <td>${Adapt.escapeHTML(c.name)}</td>
                <td>${Adapt.escapeHTML(c.email || '-')}</td>
                <td class="mono"${isDirect ? ' style="color:#c4432b;font-weight:700;"' : ''}>${Adapt.escapeHTML(c.partner_code || '-')}${isDirect ? ' <span style="font-size:10px;font-weight:normal;">（直販）</span>' : ''}</td>
                <td class="mono">${c.staff_count}</td>
                <td class="mono">${c.active_subs}</td>
                <td class="mono">${formatDate(c.created_at)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
    // フィルタ変更イベント
    const sel = document.getElementById('customerFilter');
    if (sel) sel.addEventListener('change', (e) => renderCustomers(e.target.value));
  }

  // --- Reseller登録モーダル ---
  function openAddAgentModal() {
    const wrap = document.getElementById('modalWrap');
    wrap.style.display = '';
    wrap.innerHTML = `
      <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal" id="modalBox">
          <h3>Resellerを登録</h3>
          <p class="muted" style="font-size:12px; margin:0 0 12px 0;">
            登録後、ここに表示される<strong>Resellerコード・ログインID・初期パスワード</strong>を相手先にお伝えください。
          </p>
          <div id="agentFormMsg"></div>
          <form id="agentForm" class="stack" novalidate>
            <div class="field">
              <label for="agCompany">会社名 <span class="req">*</span></label>
              <input id="agCompany" type="text" required maxlength="120" />
            </div>
            <div class="field">
              <label for="agLoginId">ログインID <span class="req">*</span></label>
              <input id="agLoginId" type="text" required />
              <div class="hint">3〜40文字の半角英数字・<code>-</code>・<code>_</code></div>
            </div>
            <div class="field">
              <label for="agPassword">初期パスワード <span class="req">*</span></label>
              <div class="pw-wrap">
                <input id="agPassword" type="password" required minlength="8" />
                <button type="button" class="pw-toggle" data-pw="agPassword">表示</button>
              </div>
              <div class="hint">8文字以上（Reseller側で変更可能）</div>
            </div>
            <div class="field">
              <label for="agEmail">メール</label>
              <input id="agEmail" type="email" />
            </div>
            <div class="field">
              <label for="agPhone">電話</label>
              <input id="agPhone" type="tel" />
            </div>
          </form>
          <div class="modal-actions">
            <button class="btn btn--ghost" id="agentCancelBtn" type="button">キャンセル</button>
            <button class="btn btn--primary" id="agentSubmitBtn" type="button">登録する</button>
          </div>
        </div>
      </div>
    `;
    Adapt.bindPasswordToggles();
    document.getElementById('agentCancelBtn').addEventListener('click', closeModal);
    document.getElementById('modalBackdrop').addEventListener('click', (e) => {
      if (e.target.id === 'modalBackdrop') closeModal();
    });
    document.getElementById('agentSubmitBtn').addEventListener('click', submitAgent);
  }

  function closeModal() {
    const wrap = document.getElementById('modalWrap');
    wrap.style.display = 'none';
    wrap.innerHTML = '';
  }

  async function submitAgent() {
    const msgEl = document.getElementById('agentFormMsg');
    const btn   = document.getElementById('agentSubmitBtn');
    msgEl.innerHTML = '';
    const body = {
      company_name: document.getElementById('agCompany').value.trim(),
      login_id: document.getElementById('agLoginId').value.trim(),
      password: document.getElementById('agPassword').value,
      email: document.getElementById('agEmail').value.trim() || undefined,
      phone: document.getElementById('agPhone').value.trim() || undefined
    };
    if (!body.company_name || !body.login_id || !body.password) {
      msgEl.innerHTML = '<div class="msg msg--err">必須項目を入力してください。</div>';
      return;
    }
    btn.disabled = true;
    btn.textContent = '登録中…';
    try {
      const r = await PartnerAPI.call('/api/partner/sub-agents', { method: 'POST', body });
      showCredentials(r.sub_agent, body.password);
      loadSubAgents();
    } catch (e) {
      const map = {
        login_id_taken: 'このログインIDは既に使われています。',
        password_too_short: 'パスワードは8文字以上にしてください。',
        invalid_login_id: 'ログインIDの形式が正しくありません。',
        invalid_email: 'メールアドレスの形式が正しくありません。',
        forbidden_super_only: 'Resellerの登録はMaster Resellerのみ可能です。',
        missing_fields: '必須項目を入力してください。'
      };
      msgEl.innerHTML = `<div class="msg msg--err">${map[e.message] || 'エラー: ' + e.message}</div>`;
      btn.disabled = false;
      btn.textContent = '登録する';
    }
  }

  function showCredentials(agent, plainPassword) {
    const wrap = document.getElementById('modalWrap');
    wrap.innerHTML = `
      <div class="modal-backdrop">
        <div class="modal">
          <h3>登録完了</h3>
          <p>Resellerを登録しました。以下の情報を相手先にお伝えください。</p>
          <div class="credentials-box">
            <div>Resellerコード: <span class="mono">${Adapt.escapeHTML(agent.code)}</span></div>
            <div>ログインID: <span class="mono">${Adapt.escapeHTML(agent.login_id)}</span></div>
            <div>初期パスワード: <span class="mono">${Adapt.escapeHTML(plainPassword)}</span></div>
            <div style="margin-top:6px; font-size:11px; color:#8a6400;">
              ※ このパスワードは再表示されません。必ずコピーして控えてください。
            </div>
          </div>
          <p style="font-size:12px; color:#555;">
            Reseller側のログインURL: <br>
            <a href="partner-login.html" target="_blank" class="mono" style="word-break:break-all;">${location.origin}/partner-login.html</a>
          </p>
          <div class="modal-actions">
            <button class="btn btn--primary" id="credOkBtn" type="button">閉じる</button>
          </div>
        </div>
      </div>
    `;
    document.getElementById('credOkBtn').addEventListener('click', closeModal);
  }

  // --- ユーティリティ ---
  function formatDate(s) {
    if (!s) return '-';
    const d = new Date(s.replace(' ', 'T') + (s.endsWith('Z') ? '' : 'Z'));
    if (isNaN(d)) return s;
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
  }
  function statusLabel(s) {
    const map = { active: '稼働中', pending: '承認待ち', expired: '契約終了', terminated: '停止' };
    return map[s] || s;
  }

  // =====================================================
  // Phase 4-3a: Resellerへの按分率編集・履歴モーダル
  // super → agent scope・/api/partner/sub-agents/:id/share[-history]
  // =====================================================
  function getShareModalWrap() {
    let wrap = document.getElementById('shareModalWrap');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'shareModalWrap';
      document.body.appendChild(wrap);
    }
    return wrap;
  }
  function closeShareModal() {
    const wrap = document.getElementById('shareModalWrap');
    if (wrap) wrap.innerHTML = '';
  }
  function todayYMD() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function firstOfNextMonthYMD() {
    const d = new Date();
    const y = d.getMonth() === 11 ? d.getFullYear() + 1 : d.getFullYear();
    const m = d.getMonth() === 11 ? 1 : d.getMonth() + 2;
    return y + '-' + String(m).padStart(2, '0') + '-01';
  }

  async function openSubAgentShareEditModal({ agentId, companyName, currentPct, parentPct }) {
    const wrap = getShareModalWrap();
    const parentInfo = parentPct != null
      ? `<div style="padding:6px 10px;background:#fff8e1;border-left:3px solid #f7c85c;margin:0 0 10px 0;font-size:12px;">
           あなた（Master Reseller）の取得率: <strong>${parentPct}%</strong>（この値を超えて設定はできません）
         </div>`
      : '';
    wrap.innerHTML = `
      <div class="modal-backdrop" id="shareBackdrop">
        <div class="modal">
          <h3>按分率の変更 - ${Adapt.escapeHTML(agentId)}</h3>
          <p style="font-size:12px;color:#666;margin:0 0 12px 0;">${Adapt.escapeHTML(companyName || '')}</p>
          ${parentInfo}
          <div style="padding:8px 10px;background:#f9fafb;border-radius:4px;margin-bottom:12px;font-size:13px;">
            現在のReseller按分率：<strong>${currentPct != null ? currentPct + '%' : '未設定'}</strong>
          </div>
          <div id="shareEditMsg"></div>
          <form id="shareEditForm" class="stack" novalidate>
            <div class="field">
              <label for="newPct">新しい按分率（%）<span class="req">*</span></label>
              <input id="newPct" type="number" step="0.1" min="0" max="${parentPct ?? 100}" required />
              <p style="font-size:11px;color:#666;margin:4px 0 0 0;">
                Resellerへの按分率。上限 = あなたの取得率。
              </p>
            </div>
            <div class="field">
              <label for="effFrom">発効日 <span class="req">*</span></label>
              <input id="effFrom" type="date" value="${firstOfNextMonthYMD()}" required />
              <p style="font-size:11px;color:#666;margin:4px 0 0 0;">
                月初日（1日）を推奨。日割り計算は行われません。
              </p>
            </div>
            <div class="field">
              <label for="shareNote">変更理由・備考</label>
              <textarea id="shareNote" rows="2" maxlength="500" placeholder="例: 契約更新に伴う調整"></textarea>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn" id="shareEditCancel">キャンセル</button>
              <button type="submit" class="btn btn--primary" id="shareEditSubmit">変更を保存</button>
            </div>
          </form>
        </div>
      </div>`;
    document.getElementById('shareBackdrop').addEventListener('click', e => {
      if (e.target.id === 'shareBackdrop') closeShareModal();
    });
    document.getElementById('shareEditCancel').addEventListener('click', closeShareModal);
    document.getElementById('shareEditForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const msgEl = document.getElementById('shareEditMsg');
      const submitBtn = document.getElementById('shareEditSubmit');
      msgEl.innerHTML = '';

      const pct = Number(document.getElementById('newPct').value);
      const effFrom = document.getElementById('effFrom').value;
      const note = document.getElementById('shareNote').value;
      if (Number.isNaN(pct) || pct < 0 || pct > 100) {
        msgEl.innerHTML = `<div class="msg msg--err">按分率は 0〜100 の数値を入力してください。</div>`;
        return;
      }
      if (!effFrom) {
        msgEl.innerHTML = `<div class="msg msg--err">発効日を入力してください。</div>`;
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = '保存中…';
      try {
        const r = await PartnerAPI.call(`/api/partner/sub-agents/${agentId}/share`, {
          method: 'POST',
          body: { pct, effective_from: effFrom, note }
        });
        Adapt.toast(`按分率を ${r.pct}% に変更しました（発効: ${r.effective_from}）`, 'success');
        closeShareModal();
        loadSubAgents();
      } catch (e) {
        const errMap = {
          invalid_pct: '按分率が不正です（0〜100・小数点第一位まで）',
          invalid_date: '発効日が不正です',
          note_too_long: '備考は500文字以内で入力してください',
          effective_before_contract: '発効日は契約開始日以降を指定してください',
          not_your_sub_agent: '権限がありません（あなたのResellerではありません）',
          forbidden_super_only: 'この操作はMaster Resellerのみ可能です',
          parent_share_not_set: 'あなたの取得率（タムジ→自社）が未設定です。管理者に連絡してください',
          partner_not_found: '対象が見つかりません'
        };
        let errMsg = errMap[e.message];
        // pct_exceeds_parent_share はメッセージをAPI側で生成している
        if (e.message === 'pct_exceeds_parent_share' || /pct_exceeds_parent_share/.test(e.message)) {
          errMsg = e.data?.message || `あなたの取得率（${parentPct}%）を超えて設定はできません`;
        }
        msgEl.innerHTML = `<div class="msg msg--err">${errMsg || 'エラー: ' + e.message}</div>`;
        submitBtn.disabled = false;
        submitBtn.textContent = '変更を保存';
      }
    });
  }

  async function openSubAgentShareHistoryModal({ agentId, companyName }) {
    const wrap = getShareModalWrap();
    wrap.innerHTML = `
      <div class="modal-backdrop" id="shareBackdrop">
        <div class="modal">
          <h3>按分率の変更履歴 - ${Adapt.escapeHTML(agentId)}</h3>
          <p style="font-size:12px;color:#666;margin:0 0 12px 0;">${Adapt.escapeHTML(companyName || '')}</p>
          <div id="shareHistContent"><p class="muted">読み込み中…</p></div>
          <div class="modal-actions">
            <button type="button" class="btn btn--primary" id="shareHistClose">閉じる</button>
          </div>
        </div>
      </div>`;
    document.getElementById('shareBackdrop').addEventListener('click', e => {
      if (e.target.id === 'shareBackdrop') closeShareModal();
    });
    document.getElementById('shareHistClose').addEventListener('click', closeShareModal);
    try {
      const r = await PartnerAPI.call(`/api/partner/sub-agents/${agentId}/share-history`);
      const list = r.history || [];
      const c = document.getElementById('shareHistContent');
      if (list.length === 0) {
        c.innerHTML = `<p class="muted">履歴はまだありません。右上の [按分率] から初回設定を行ってください。</p>`;
        return;
      }
      c.innerHTML = list.map((h) => {
        const active = (!h.effective_to && h.effective_from <= todayYMD());
        const future = h.effective_from > todayYMD();
        const label = active ? '現在' : (future ? '未来発効' : '過去');
        const tagClass = active ? 'status-active' : (future ? 'status-pending' : 'status-expired');
        return `
          <div style="border:1px solid #e3e3e0;border-radius:6px;padding:10px 12px;margin-bottom:8px;${active ? 'background:#fff8e1;' : ''}">
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
              <div><span class="status-badge ${tagClass}">${label}</span> <strong style="font-size:16px;margin-left:6px;">${h.pct}%</strong></div>
              <div class="mono" style="font-size:11px;color:#666;">#${h.id}</div>
            </div>
            <div class="mono" style="font-size:12px;color:#444;margin-top:4px;">
              発効: ${h.effective_from}${h.effective_to ? ' 〜 ' + h.effective_to : ' 〜 現在有効'}
            </div>
            <div style="font-size:11px;color:#666;margin-top:2px;">
              設定: ${Adapt.escapeHTML(h.set_by || '-')} / ${formatDate(h.created_at)}
            </div>
            ${h.note ? `<div style="font-size:12px;margin-top:4px;padding:4px 8px;background:#f9fafb;border-radius:3px;">${Adapt.escapeHTML(h.note)}</div>` : ''}
          </div>
        `;
      }).join('');
    } catch (e) {
      document.getElementById('shareHistContent').innerHTML =
        `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  }

  // =====================================================
  // Phase 4-3e: Reseller詳細モーダル（super 側）
  // GET /api/partner/sub-agents/:agent_id/customers
  // =====================================================
  async function openSubAgentDetailModal({ agentId, agentCode, companyName }) {
    const wrap = getShareModalWrap();
    wrap.innerHTML = `
      <div class="modal-backdrop" id="detailBackdrop">
        <div class="modal" style="max-width:760px;">
          <h3>Reseller詳細 - ${Adapt.escapeHTML(agentId)}</h3>
          <p style="font-size:12px;color:#666;margin:0 0 12px 0;">
            ${Adapt.escapeHTML(companyName || '')} <span class="mono" style="margin-left:8px;">コード: ${Adapt.escapeHTML(agentCode || '-')}</span>
          </p>
          <div id="subDetailContent"><p class="muted">読み込み中…</p></div>
          <div class="modal-actions">
            <button type="button" class="btn btn--primary" id="subDetailClose">閉じる</button>
          </div>
        </div>
      </div>`;
    document.getElementById('detailBackdrop').addEventListener('click', e => {
      if (e.target.id === 'detailBackdrop') closeShareModal();
    });
    document.getElementById('subDetailClose').addEventListener('click', closeShareModal);
    try {
      const r = await PartnerAPI.call(`/api/partner/sub-agents/${agentId}/customers`);
      const list = r.customers || [];
      const c = document.getElementById('subDetailContent');
      if (list.length === 0) {
        c.innerHTML = `
          <p class="muted">このResellerにはまだご紹介先企業がいません。</p>
          <p style="font-size:12px;color:#666;">相手先にパートナーコード「<strong class="mono">${Adapt.escapeHTML(agentCode || '-')}</strong>」を案内して、ご紹介先企業の登録を促してください。</p>
        `;
        return;
      }
      const totalStaff = list.reduce((s, x) => s + (x.staff_count || 0), 0);
      const totalActiveSubs = list.reduce((s, x) => s + (x.active_subs || 0), 0);
      c.innerHTML = `
        <div class="metric-grid" style="margin-bottom:12px;">
          <div class="metric">
            <div class="metric__label">ご紹介先企業</div>
            <div class="metric__value">${list.length}<span class="metric__unit">社</span></div>
          </div>
          <div class="metric">
            <div class="metric__label">合計スタッフ数</div>
            <div class="metric__value">${totalStaff}<span class="metric__unit">名</span></div>
          </div>
          <div class="metric">
            <div class="metric__label">有料契約</div>
            <div class="metric__value">${totalActiveSubs}<span class="metric__unit">件</span></div>
          </div>
        </div>
        <h4 style="margin:0 0 8px 0;font-size:13px;color:#c4432b;">ご紹介先企業一覧</h4>
        <div style="max-height:280px;overflow-y:auto;">
        <table style="font-size:12px;">
          <thead><tr>
            <th>会社ID</th><th>会社名</th><th>メール</th><th>スタッフ</th><th>有料契約</th><th>登録日</th>
          </tr></thead>
          <tbody>
            ${list.map(cu => `
              <tr>
                <td class="mono">${Adapt.escapeHTML(cu.company_id)}</td>
                <td>${Adapt.escapeHTML(cu.name)}</td>
                <td>${Adapt.escapeHTML(cu.email || '-')}</td>
                <td class="mono">${cu.staff_count}</td>
                <td class="mono">${cu.active_subs}</td>
                <td class="mono">${formatDate(cu.created_at)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
      `;
    } catch (e) {
      const errMap = {
        not_your_sub_agent: '権限がありません（あなたのResellerではありません）',
        forbidden_super_only: 'この操作はMaster Resellerのみ可能です',
        partner_not_found: '対象が見つかりません'
      };
      document.getElementById('subDetailContent').innerHTML =
        `<div class="msg msg--err">${errMap[e.message] || '取得失敗: ' + Adapt.escapeHTML(e.message)}</div>`;
    }
  }
})();
</script>
</body>
</html>
