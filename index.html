<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>ホーム｜Adavoo</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<div id="adapt-header"></div>

<main class="container">
  <section class="page-intro">
    <p class="section-label">Home</p>
    <h1 id="greet">ようこそ</h1>
    <p>モジュールを選んで起動できます。未連携のモジュールは「連携する」から紐付けてください。</p>
    <div style="margin-top:12px;">
      <a class="btn btn--primary btn--sm" href="purchase.html">＋ モジュール購入</a>
    </div>
  </section>

  <div id="msg"></div>

  <section>
    <p class="section-label">モジュール</p>
    <div id="grid" class="launcher-grid"></div>
  </section>
</main>

<div class="modal-bg" id="linkModal">
  <div class="modal">
    <h3 class="modal__title" id="linkTitle">アカウントを連携</h3>
    <p class="modal__sub" id="linkSub"></p>
    <div id="linkMsg"></div>
    <form id="linkForm" class="stack">
      <input type="hidden" id="linkApp" />
      <div class="field">
        <label for="linkLoginId">モジュールのログインID</label>
        <input id="linkLoginId" type="text" required autocomplete="off" />
      </div>
      <div class="field">
        <label for="linkPassword">モジュールのパスワード</label>
        <div class="pw-wrap">
          <input id="linkPassword" type="password" required autocomplete="current-password" />
          <button type="button" class="pw-toggle" data-pw="linkPassword">表示</button>
        </div>
        <div class="hint">連携確認にのみ使用し、Adavoo側には保存しません。</div>
      </div>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="linkCancel">キャンセル</button>
        <button type="submit" class="btn btn--primary" id="linkSubmit">連携する</button>
      </div>
    </form>
  </div>
</div>

<script src="assets/common.js"></script>
<script>
(async function () {
  const session = await Adapt.requireLogin('lp.html');
  if (!session) return;

  Adapt.renderHeader({ loggedIn: true, active: 'home' });

  document.getElementById('greet').textContent = `ようこそ、${session.user.name || session.user.login_id} さん`;

  if (new URLSearchParams(location.search).get('welcome') === '1') {
    document.getElementById('msg').innerHTML = `
      <div class="msg msg--ok">
        Adavooアカウントを作成しました。<br>
        すでにTouchvooやMedvooのアカウントをお持ちの場合は、各カードの「連携する」から紐付けしてください。
      </div>`;
  }

  const linksRes = await AdaptAPI.call('/api/apps/links');
  const linkedSet = {};
  (linksRes.links || []).forEach(l => linkedSet[l.app_name] = l);

  const apps = window.ADAPT_CONFIG.APPS;
  const grid = document.getElementById('grid');
  grid.innerHTML = Object.entries(apps).map(([key, a]) => {
    const linked = linkedSet[key];
    return `
      <article class="app-card" data-app="${key}">
        <div class="app-card__head">
          <h3 class="app-card__name">${a.name}</h3>
          <span class="app-card__badge ${linked ? 'badge--linked' : 'badge--unlinked'}">
            ${linked ? 'Linked' : 'Not linked'}
          </span>
        </div>
        <p class="app-card__desc">${a.desc}</p>
        <div class="app-card__actions">
          <button class="btn ${linked ? 'btn--dark' : 'btn--primary'} btn--sm" data-action="${linked ? 'open' : 'link'}" data-app="${key}">
            ${linked ? '開く' : '連携する'}
          </button>
          <a class="btn btn--ghost btn--sm" href="${a.lp}" target="_blank" rel="noopener">LP</a>
          ${linked ? `<button class="btn btn--ghost btn--sm" data-action="unlink" data-link-id="${linked.id}">解除</button>` : ''}
        </div>
        <div class="app-card__meta">
          ${a.tags}
          ${linked ? ` / ${Adapt.escapeHTML(linked.child_login_id)}` : ''}
        </div>
      </article>
    `;
  }).join('');

  grid.addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const app = btn.dataset.app;

    if (action === 'link') {
      openLink(app);
    } else if (action === 'open') {
      btn.disabled = true;
      btn.textContent = '起動中…';
      try {
        const r = await AdaptAPI.call('/api/apps/sso-ticket', { method: 'POST', body: { app_name: app } });
        window.open(r.redirect_url, '_blank', 'noopener');
      } catch (err) {
        Adapt.toast('起動に失敗: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '開く';
      }
    } else if (action === 'unlink') {
      if (!confirm('この連携を解除しますか？')) return;
      try {
        await AdaptAPI.call('/api/apps/links/' + btn.dataset.linkId, { method: 'DELETE' });
        location.reload();
      } catch (err) { Adapt.toast('解除失敗: ' + err.message, 'error'); }
    }
  });

  const modal = document.getElementById('linkModal');
  const titleEl = document.getElementById('linkTitle');
  const subEl = document.getElementById('linkSub');
  const appEl = document.getElementById('linkApp');
  const form = document.getElementById('linkForm');
  const msgEl = document.getElementById('linkMsg');
  const submitBtn = document.getElementById('linkSubmit');

  Adapt.bindPasswordToggles();

  function openLink(app) {
    const info = apps[app];
    titleEl.textContent = `${info.name} と連携`;
    subEl.textContent = `${info.name}の既存アカウント（ログインID + パスワード）を入力してください。認証に成功した場合のみ連携されます。`;
    msgEl.innerHTML = '';
    form.reset();
    appEl.value = app;
    modal.classList.add('open');
    setTimeout(() => document.getElementById('linkLoginId').focus(), 50);
  }
  document.getElementById('linkCancel').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = '確認中…';
    msgEl.innerHTML = '';
    try {
      await AdaptAPI.call('/api/apps/links', {
        method: 'POST',
        body: {
          app_name: appEl.value,
          child_login_id: document.getElementById('linkLoginId').value.trim(),
          child_password: document.getElementById('linkPassword').value
        }
      });
      modal.classList.remove('open');
      location.reload();
    } catch (err) {
      const map = {
        child_auth_failed: 'モジュールのログインに失敗しました。IDとパスワードを確認してください。',
        already_linked: 'このアカウントは既に連携されています。',
        invalid_app: '無効なアプリです。'
      };
      msgEl.innerHTML = `<div class="msg msg--err">${map[err.message] || 'エラー: ' + err.message}</div>`;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '連携する';
    }
  });
})();
</script>
</body>
</html>
