<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1280, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
<meta name="robots" content="noindex" />
<title>タムジ管理画面｜やるゼ！</title>
<link rel="stylesheet" href="assets/style.css?v=20260430c" />
<style>
  .metric-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin: 8px 0 4px 0;
  }
  .metric {
    border: 1px solid var(--line, #e3e3e0);
    border-radius: 6px;
    padding: 14px 16px;
    background: #fff;
  }
  .metric__label {
    font-size: 12px; color: #666; letter-spacing: 0.04em; margin-bottom: 4px;
  }
  .metric__value {
    font-size: 24px; font-weight: 700; color: #0a0e1a; font-variant-numeric: tabular-nums;
  }
  .metric__unit { font-size: 12px; color: #666; font-weight: 400; margin-left: 4px; }
  .metric--highlight { background: #fff8e1; border-color: #f7c85c; }

  .tab-bar {
    display: flex; gap: 4px; border-bottom: 1px solid var(--line, #e3e3e0); margin-bottom: 16px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none; border: 0; border-bottom: 2px solid transparent;
    padding: 10px 16px; cursor: pointer; font-size: 13px; color: #666;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab-btn.active { color: #c4432b; border-bottom-color: #c4432b; font-weight: 700; }
  @media (max-width: 480px) {
    .tab-btn { padding: 8px 11px; font-size: 12px; }
  }

  .status-badge {
    display: inline-block; padding: 2px 8px; border-radius: 100px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
  }
  .status-active     { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
  .status-pending    { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
  .status-expired    { background: #f3f4f6; color: #4b5563; border: 1px solid #d1d5db; }
  .status-terminated { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 9000;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: #fff; border-radius: 8px; padding: 24px 28px;
    max-width: 520px; width: calc(100% - 32px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 16px 0; font-size: 16px; }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .credentials-box {
    background: #fff8e1; border: 1px solid #f7c85c; border-radius: 6px;
    padding: 12px 14px; margin: 12px 0; font-size: 13px; line-height: 1.7;
  }
  .credentials-box .mono { font-weight: 700; font-size: 14px; }
</style>
</head>
<body>
<div id="adapt-header"></div>

<main class="container">
  <section class="page-intro">
    <p class="section-label">TAmJump Admin</p>
    <h1>タムジ管理画面</h1>
    <p>Reseller・売上・支払い台帳の全体管理</p>
  </section>

  <div class="stack">

    <!-- 全体サマリー -->
    <section class="card">
      <h2 class="panel-title">全体サマリー</h2>
      <div id="summaryContent"><p class="muted">読み込み中…</p></div>
    </section>

    <!-- タブ -->
    <section class="card">
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="partners">Reseller管理</button>
        <button class="tab-btn" data-tab="requests">契約申請 <span id="reqBadge" style="display:none;background:#c4432b;color:#fff;border-radius:100px;padding:1px 7px;font-size:10px;margin-left:4px;">0</span></button>
        <button class="tab-btn" data-tab="invitations">招待管理</button>
        <button class="tab-btn" data-tab="notify">通知送信</button>
        <button class="tab-btn" data-tab="ledger">月次台帳</button>
        <button class="tab-btn" data-tab="revenue">売上推移</button>
      </div>

      <!-- Reseller管理タブ -->
      <div id="tab-partners">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <h2 class="panel-title" style="margin:0;">Reseller一覧</h2>
          <button class="btn btn--primary btn--sm" id="addSuperBtn" type="button">＋ Master Resellerを登録</button>
        </div>
        <div id="partnersContent"><p class="muted">読み込み中…</p></div>
      </div>

      <!-- 契約申請タブ（Phase 4-3d） -->
      <div id="tab-requests" style="display:none;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <h2 class="panel-title" style="margin:0;">保留中の契約申請</h2>
          <button class="btn btn--ghost btn--sm" id="reloadReqBtn" type="button">再読み込み</button>
        </div>
        <div id="requestsContent"><p class="muted">読み込み中…</p></div>
      </div>

      <!-- 招待管理タブ（Phase 4-3b） -->
      <div id="tab-invitations" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <h2 class="panel-title" style="margin:0;">招待管理</h2>
          <div style="display:flex;gap:8px;">
            <button class="btn btn--ghost btn--sm" id="reloadInvBtn" type="button">再読み込み</button>
            <button class="btn btn--primary btn--sm" id="newInviteBtn" type="button">＋ Master Resellerを招待</button>
          </div>
        </div>
        <div id="invitationsContent"><p class="muted">読み込み中…</p></div>
      </div>

      <!-- 通知送信タブ（Phase 4-4） -->
      <div id="tab-notify" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <h2 class="panel-title" style="margin:0;">Resellerへの通知送信</h2>
        </div>
        <div class="stack">
          <section style="border:1px solid #e3e3e0;border-radius:6px;padding:16px 18px;">
            <h3 style="margin:0 0 12px 0;font-size:14px;">新しい通知を送信</h3>
            <div id="notifyMsg"></div>
            <form id="notifyForm" class="stack" novalidate style="max-width:640px;">
              <div class="field">
                <label for="ntScope">宛先 <span class="req">*</span></label>
                <select id="ntScope">
                  <option value="all_active">全稼働中（Master Reseller+Reseller）</option>
                  <option value="all_supers">全Master Reseller（active のみ）</option>
                  <option value="individual">個別指定（partner_id を選ぶ）</option>
                </select>
              </div>
              <div class="field" id="ntIndividualField" style="display:none;">
                <label>個別宛先（複数チェック可）</label>
                <div id="ntIndividualList" style="max-height:200px;overflow-y:auto;border:1px solid #e3e3e0;border-radius:4px;padding:8px;font-size:12px;">
                  <span class="muted">読み込み中…</span>
                </div>
              </div>
              <div class="field">
                <label for="ntTitle">タイトル <span class="req">*</span></label>
                <input id="ntTitle" type="text" maxlength="200" required />
              </div>
              <div class="field">
                <label for="ntBody">本文 <span class="req">*</span></label>
                <textarea id="ntBody" rows="6" maxlength="5000" required placeholder="改行も保持されます"></textarea>
                <div class="hint">最大5000文字</div>
              </div>
              <div class="field">
                <label for="ntActionUrl">アクションURL（任意）</label>
                <input id="ntActionUrl" type="url" maxlength="500" placeholder="例: partner-account.html" />
                <div class="hint">受信者が「詳細を見る」をクリックした際の遷移先</div>
              </div>
              <div class="field">
                <label for="ntPriority">優先度</label>
                <select id="ntPriority">
                  <option value="normal" selected>通常</option>
                  <option value="high">重要</option>
                  <option value="low">低</option>
                </select>
              </div>
              <div style="display:flex;justify-content:flex-end;gap:8px;">
                <button type="submit" class="btn btn--primary" id="ntSubmit">送信</button>
              </div>
            </form>
          </section>

          <section style="border:1px solid #e3e3e0;border-radius:6px;padding:16px 18px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
              <h3 style="margin:0;font-size:14px;">送信履歴</h3>
              <button class="btn btn--ghost btn--sm" id="reloadNotifyBtn" type="button">再読み込み</button>
            </div>
            <div id="notifyHistoryContent"><p class="muted">読み込み中…</p></div>
          </section>
        </div>
      </div>

      <!-- 月次台帳タブ -->
      <div id="tab-ledger" style="display:none;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <h2 class="panel-title" style="margin:0;">月次売上台帳</h2>
          <input type="month" id="ledgerMonthPicker" style="padding:6px 10px; border:1px solid var(--line,#e3e3e0); border-radius:4px;" />
          <button class="btn btn--ghost btn--sm" id="reloadLedgerBtn" type="button">再読み込み</button>
        </div>
        <div id="ledgerContent"><p class="muted">月を選択してください。</p></div>
      </div>

      <!-- 売上推移タブ -->
      <div id="tab-revenue" style="display:none;">
        <h2 class="panel-title">月別売上推移（直近12ヶ月）</h2>
        <div id="revenueContent"><p class="muted">読み込み中…</p></div>
      </div>
    </section>

  </div>
</main>

<div id="modalWrap" style="display:none;"></div>

<script src="assets/common.js?v=20260430c"></script>
<script>
(async function () {
  const session = await Adapt.requireLogin('login.html');
  if (!session) return;

  // tamj_admin 以外はトップへ
  if (session.user.role !== 'tamj_admin') {
    alert('この画面はタムジ社管理者のみアクセス可能です。');
    location.href = 'index.html';
    return;
  }

  Adapt.renderHeader({ loggedIn: true, active: '' });
  Adapt.bindPasswordToggles();

  // 初期ロード
  loadSummary();
  loadPartners();
  loadRequestsBadge();

  // タブ切替
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      ['partners','requests','invitations','notify','ledger','revenue'].forEach(k => {
        document.getElementById('tab-' + k).style.display = (k === btn.dataset.tab) ? '' : 'none';
      });
      if (btn.dataset.tab === 'revenue') loadRevenue();
      if (btn.dataset.tab === 'requests') loadRequests();
      if (btn.dataset.tab === 'invitations') loadInvitations();
      if (btn.dataset.tab === 'notify') initNotifyTab();
    });
  });
  document.getElementById('reloadReqBtn').addEventListener('click', loadRequests);
  document.getElementById('reloadInvBtn').addEventListener('click', loadInvitations);
  document.getElementById('newInviteBtn').addEventListener('click', openNewInviteModal);
  document.getElementById('reloadNotifyBtn').addEventListener('click', loadNotifyHistory);

  // 月次台帳
  const today = new Date();
  const thisYM = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
  document.getElementById('ledgerMonthPicker').value = thisYM;
  document.getElementById('ledgerMonthPicker').addEventListener('change', loadLedger);
  document.getElementById('reloadLedgerBtn').addEventListener('click', loadLedger);
  loadLedger();

  // Master Reseller登録
  document.getElementById('addSuperBtn').addEventListener('click', openAddSuperModal);

  // --- サマリー ---
  async function loadSummary() {
    const el = document.getElementById('summaryContent');
    try {
      const r = await AdaptAPI.call('/api/admin/summary');
      const s = r.summary;
      const l = r.current_month_ledger;
      el.innerHTML = `
        <div class="metric-grid">
          <div class="metric">
            <div class="metric__label">Master Reseller</div>
            <div class="metric__value">${s.super_active}<span class="metric__unit">/ ${s.super_total}社</span></div>
            ${s.super_pending > 0 ? `<div style="font-size:11px; color:#92400e; margin-top:4px;">承認待ち ${s.super_pending}件</div>` : ''}
          </div>
          <div class="metric">
            <div class="metric__label">Reseller</div>
            <div class="metric__value">${s.agent_active}<span class="metric__unit">/ ${s.agent_total}社</span></div>
          </div>
          <div class="metric">
            <div class="metric__label">エンドユーザー</div>
            <div class="metric__value">${s.company_total}<span class="metric__unit">社</span></div>
            <div style="font-size:11px; color:#666; margin-top:4px;">うち直販 ${s.company_direct}社</div>
          </div>
          <div class="metric">
            <div class="metric__label">有料契約中</div>
            <div class="metric__value">${s.active_subscription_count}<span class="metric__unit">件</span></div>
          </div>
          <div class="metric metric--highlight">
            <div class="metric__label">当月売上（${l.year_month}）</div>
            <div class="metric__value">¥${l.gross_amount.toLocaleString()}</div>
          </div>
          <div class="metric metric--highlight">
            <div class="metric__label">未払い支払予定</div>
            <div class="metric__value">¥${l.pending_payout.toLocaleString()}</div>
            <div style="font-size:11px; color:#666; margin-top:4px;">支払済 ¥${l.paid_payout.toLocaleString()}</div>
          </div>
        </div>
      `;
    } catch (e) {
      el.innerHTML = `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  }

  // --- Reseller一覧 ---
  async function loadPartners() {
    const el = document.getElementById('partnersContent');
    try {
      const r = await AdaptAPI.call('/api/admin/partners');
      const list = r.partners || [];
      if (list.length === 0) {
        el.innerHTML = `<p class="muted">まだResellerが登録されていません。</p>`;
        return;
      }
      // Master ResellerとResellerを分けて表示
      const supers = list.filter(p => p.type === 'super');
      const agents = list.filter(p => p.type === 'agent');

      el.innerHTML = `
        <h3 style="margin-top:8px;">Master Reseller (${supers.length})</h3>
        ${renderPartnerTable(supers, true)}
        <h3 style="margin-top:24px;">Reseller (${agents.length})</h3>
        ${renderPartnerTable(agents, false)}
      `;

      el.querySelectorAll('[data-approve]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pid = btn.dataset.approve;
          if (!confirm(pid + ' を承認して契約開始しますか？\n（契約期間: 承認日〜1年後）')) return;
          btn.disabled = true;
          try {
            await AdaptAPI.call(`/api/admin/partners/${pid}/approve`, { method: 'POST' });
            Adapt.toast('承認しました', 'success');
            loadSummary();
            loadPartners();
          } catch (e) {
            Adapt.toast('承認失敗: ' + e.message, 'error');
            btn.disabled = false;
          }
        });
      });

      // 按分率変更ボタン
      el.querySelectorAll('[data-share-edit]').forEach(btn => {
        btn.addEventListener('click', () => {
          openShareEditModal({
            partnerId: btn.dataset.shareEdit,
            companyName: btn.dataset.shareCompany,
            currentPct: btn.dataset.sharePct !== '' ? Number(btn.dataset.sharePct) : null,
            scope: 'admin' // admin mode: /api/admin/partners/:id/share
          });
        });
      });
      // 按分率履歴ボタン
      el.querySelectorAll('[data-share-history]').forEach(btn => {
        btn.addEventListener('click', () => {
          openShareHistoryModal({
            partnerId: btn.dataset.shareHistory,
            companyName: btn.dataset.shareCompany,
            scope: 'admin'
          });
        });
      });
      // Phase 4-3e: Reseller詳細ドリルダウン
      el.querySelectorAll('[data-detail]').forEach(btn => {
        btn.addEventListener('click', () => {
          openPartnerDetailModal({
            partnerId: btn.dataset.detail,
            companyName: btn.dataset.detailCompany
          });
        });
      });
    } catch (e) {
      el.innerHTML = `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  }

  function renderPartnerTable(list, isSuper) {
    if (list.length === 0) return `<p class="muted">なし</p>`;
    return `
      <table>
        <thead>
          <tr>
            <th>コード</th><th>会社名</th><th>ログインID</th>
            ${isSuper ? '<th>按分率</th>' : '<th>所属</th>'}
            <th>パートナー／ご紹介先</th><th>契約期間</th><th>状態</th><th>操作</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(p => `
            <tr>
              <td class="mono">${Adapt.escapeHTML(p.code)}</td>
              <td>${Adapt.escapeHTML(p.company_name)}</td>
              <td class="mono">${Adapt.escapeHTML(p.login_id)}</td>
              ${isSuper
                ? `<td class="mono">${p.revenue_share_pct != null ? p.revenue_share_pct + '%' : '-'}</td>`
                : `<td class="mono">${Adapt.escapeHTML(p.parent_partner_id || '-')}</td>`
              }
              <td class="mono">
                ${isSuper ? `Reseller ${p.child_agent_count}社 / ` : ''}
                ユーザー ${p.direct_customer_count}社
              </td>
              <td class="mono">${p.contract_start_at ? formatDate(p.contract_start_at) + ' 〜 ' + formatDate(p.contract_end_at) : '-'}</td>
              <td><span class="status-badge status-${p.status}">${statusLabel(p.status)}</span></td>
              <td>
                ${p.status === 'pending' ? `<button class="btn btn--primary btn--sm" data-approve="${p.partner_id}">承認</button>` : ''}
                <button class="btn btn--sm" data-detail="${p.partner_id}" data-detail-company="${Adapt.escapeHTML(p.company_name)}">詳細</button>
                ${isSuper && p.status === 'active' ? `
                  <button class="btn btn--sm" data-share-edit="${p.partner_id}" data-share-pct="${p.revenue_share_pct ?? ''}" data-share-company="${Adapt.escapeHTML(p.company_name)}">按分率</button>
                  <button class="btn btn--sm" data-share-history="${p.partner_id}" data-share-company="${Adapt.escapeHTML(p.company_name)}">履歴</button>
                ` : ''}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  // --- 月次台帳 ---
  async function loadLedger() {
    const ym = document.getElementById('ledgerMonthPicker').value;
    const el = document.getElementById('ledgerContent');
    if (!ym) { el.innerHTML = '<p class="muted">月を選択してください。</p>'; return; }
    el.innerHTML = '<p class="muted">読み込み中…</p>';
    try {
      const r = await AdaptAPI.call('/api/admin/ledger/' + ym);
      const entries = r.entries || [];
      const s = r.summary;

      const summaryHtml = `
        <div class="metric-grid" style="margin-bottom:16px;">
          <div class="metric">
            <div class="metric__label">エントリ数</div>
            <div class="metric__value">${s.entry_count}<span class="metric__unit">件</span></div>
          </div>
          <div class="metric">
            <div class="metric__label">売上総額</div>
            <div class="metric__value">¥${s.gross_amount.toLocaleString()}</div>
          </div>
          <div class="metric">
            <div class="metric__label">按分後支払額</div>
            <div class="metric__value">¥${s.share_amount.toLocaleString()}</div>
          </div>
          <div class="metric metric--highlight">
            <div class="metric__label">未払い</div>
            <div class="metric__value">¥${s.pending_payout.toLocaleString()}</div>
          </div>
          <div class="metric">
            <div class="metric__label">支払済</div>
            <div class="metric__value">¥${s.paid_payout.toLocaleString()}</div>
          </div>
        </div>
      `;

      if (entries.length === 0) {
        el.innerHTML = summaryHtml + `<p class="muted">この月の台帳エントリはまだありません。月末のCronバッチで自動生成されます（Phase 3e実装予定）。</p>`;
        return;
      }

      el.innerHTML = summaryHtml + `
        <table>
          <thead><tr>
            <th>支払先コード</th><th>Master Reseller名</th><th>モジュール</th>
            <th>売上</th><th>按分率</th><th>支払額</th>
            <th>状態</th><th>支払日</th><th>操作</th>
          </tr></thead>
          <tbody>
            ${entries.map(e => `
              <tr>
                <td class="mono">${Adapt.escapeHTML(e.partner_code)}</td>
                <td>${Adapt.escapeHTML(e.partner_company_name || '-')}</td>
                <td class="mono">${Adapt.escapeHTML(e.app_name)}</td>
                <td class="mono">¥${(e.gross_amount || 0).toLocaleString()}</td>
                <td class="mono">${e.share_pct}%</td>
                <td class="mono">¥${(e.share_amount || 0).toLocaleString()}</td>
                <td><span class="status-badge status-${e.status === 'paid' ? 'active' : e.status === 'pending' ? 'pending' : 'expired'}">${ledgerStatusLabel(e.status)}</span></td>
                <td class="mono">${e.paid_at ? formatDate(e.paid_at) : '-'}</td>
                <td>
                  ${e.status === 'pending'
                    ? `<button class="btn btn--primary btn--sm" data-mark-paid="${e.id}">支払完了</button>`
                    : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      el.querySelectorAll('[data-mark-paid]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.markPaid;
          if (!confirm('このエントリを「支払い完了」にマークしますか？\n※ この操作は監査ログに記録されます。')) return;
          btn.disabled = true;
          try {
            await AdaptAPI.call(`/api/admin/ledger/${id}/mark-paid`, { method: 'POST' });
            Adapt.toast('支払い完了としてマークしました', 'success');
            loadSummary();
            loadLedger();
          } catch (e) {
            Adapt.toast('失敗: ' + e.message, 'error');
            btn.disabled = false;
          }
        });
      });
    } catch (e) {

  // --- ユーティリティ ---
  function formatDate(s) {
    if (!s) return '-';
    const d = new Date(s.replace(' ', 'T') + (s.endsWith('Z') ? '' : 'Z'));
    if (isNaN(d)) return s;
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit' });
  }
  function statusLabel(s) {
    const map = { active: '稼働中', pending: '承認待ち', expired: '契約終了', terminated: '停止' };
    return map[s] || s;
  }
  function ledgerStatusLabel(s) {
    const map = { pending: '未払い', paid: '支払済', canceled: '取消' };
    return map[s] || s;
  }

  // =====================================================
  // Phase 4-3d: 契約申請（継続/終了）の一覧と承認/却下
  // =====================================================
  async function loadRequestsBadge() {
    try {
      const r = await AdaptAPI.call('/api/admin/renewal-requests');
      const n = (r.requests || []).length;
      const badge = document.getElementById('reqBadge');
      if (n > 0) {
        badge.textContent = n;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }
    } catch {}
  }

  async function loadRequests() {
    const el = document.getElementById('requestsContent');
    el.innerHTML = '<p class="muted">読み込み中…</p>';
    try {
      const r = await AdaptAPI.call('/api/admin/renewal-requests');
      const list = r.requests || [];
      if (list.length === 0) {
        el.innerHTML = `<p class="muted">現在、保留中の契約申請はありません。</p>`;
        loadRequestsBadge();
        return;
      }
      // 継続/終了 の2グループに分離
      const renewals = list.filter(x => x.renewal_requested_at);
      const terminates = list.filter(x => x.terminate_requested_at);

      let html = '';
      if (renewals.length > 0) {
        html += `<h3 style="margin-top:4px;">継続申請（${renewals.length}）</h3>`;
        html += renewals.map(p => renderRequestCard(p, 'renewal')).join('');
      }
      if (terminates.length > 0) {
        html += `<h3 style="margin-top:16px;">終了申請（${terminates.length}）</h3>`;
        html += terminates.map(p => renderRequestCard(p, 'terminate')).join('');
      }
      el.innerHTML = html;

      // イベントバインド
      el.querySelectorAll('[data-approve-renewal]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pid = btn.dataset.approveRenewal;
          if (!confirm(pid + ' の継続申請を承認しますか？\n（契約期間を +1年延長します）')) return;
          btn.disabled = true;
          try {
            const r = await AdaptAPI.call(`/api/admin/partners/${pid}/approve-renewal`, { method: 'POST' });
            Adapt.toast('継続を承認しました（新契約終了日: ' + new Date(r.new_contract_end_at).toLocaleDateString('ja-JP') + '）', 'success');
            loadRequests();
            loadPartners();
          } catch (e) {
            Adapt.toast('承認失敗: ' + e.message, 'error');
            btn.disabled = false;
          }
        });
      });
      el.querySelectorAll('[data-reject-renewal]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pid = btn.dataset.rejectRenewal;
          const reason = prompt('却下理由（任意・500文字以内・相手にメール通知されます）:');
          if (reason === null) return; // cancel
          if (!confirm(pid + ' の継続申請を却下します。よろしいですか？')) return;
          try {
            await AdaptAPI.call(`/api/admin/partners/${pid}/reject-renewal`, {
              method: 'POST',
              body: { reason }
            });
            Adapt.toast('継続申請を却下しました', 'success');
            loadRequests();
          } catch (e) {
            Adapt.toast('却下失敗: ' + e.message, 'error');
          }
        });
      });
      el.querySelectorAll('[data-approve-terminate]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pid = btn.dataset.approveTerminate;
          if (!confirm(pid + ' の終了申請を承認します。\n※ 契約が即時終了し、ログインセッションが全て破棄されます。\nよろしいですか？')) return;
          btn.disabled = true;
          try {
            await AdaptAPI.call(`/api/admin/partners/${pid}/approve-terminate`, { method: 'POST' });
            Adapt.toast('契約を終了しました', 'success');
            loadRequests();
            loadPartners();
          } catch (e) {
            Adapt.toast('承認失敗: ' + e.message, 'error');
            btn.disabled = false;
          }
        });
      });
      el.querySelectorAll('[data-reject-terminate]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const pid = btn.dataset.rejectTerminate;
          const reason = prompt('却下理由（任意・500文字以内・相手にメール通知されます）:');
          if (reason === null) return;
          if (!confirm(pid + ' の終了申請を却下します。よろしいですか？')) return;
          try {
            await AdaptAPI.call(`/api/admin/partners/${pid}/reject-terminate`, {
              method: 'POST',
              body: { reason }
            });
            Adapt.toast('終了申請を却下しました', 'success');
            loadRequests();
          } catch (e) {
            Adapt.toast('却下失敗: ' + e.message, 'error');
          }
        });
      });

      loadRequestsBadge();
    } catch (e) {
      el.innerHTML = `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  }

  function renderRequestCard(p, kind) {
    const requestedAt = kind === 'renewal' ? p.renewal_requested_at : p.terminate_requested_at;
    const note = kind === 'renewal' ? p.renewal_note : p.terminate_note;
    const typeLabel = p.type === 'super' ? 'Master Reseller' : 'Reseller';
    const kindLabel = kind === 'renewal' ? '継続' : '終了';
    const borderColor = kind === 'renewal' ? '#15803d' : '#b45309';
    return `
      <div style="border:1px solid #e3e3e0;border-left:4px solid ${borderColor};border-radius:6px;padding:12px 14px;margin-bottom:8px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;">

            <span class="mono" style="font-weight:700;">${Adapt.escapeHTML(p.partner_id)}</span>

          </div>
          <div style="font-size:11px;color:#666;">申請日: ${new Date(requestedAt).toLocaleString('ja-JP')}</div>

        <div style="font-size:12px;color:#444;margin-top:4px;">
          契約期間: <span class="mono">${formatDate(p.contract_start_at)} 〜 ${formatDate(p.contract_end_at)}</span>
          / 連絡先: ${Adapt.escapeHTML(p.email || '-')}
        </div>
        ${note ? `<div style="font-size:12px;margin-top:6px;padding:6px 10px;background:#f9fafb;border-radius:3px;">備考: ${Adapt.escapeHTML(note)}</div>` : ''}
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end;">
          ${kind === 'renewal' ? `
            <button class="btn btn--sm" data-reject-renewal="${p.partner_id}">却下</button>
            <button class="btn btn--primary btn--sm" data-approve-renewal="${p.partner_id}">承認（+1年）</button>
          ` : `
            <button class="btn btn--sm" data-reject-terminate="${p.partner_id}">却下</button>
            <button class="btn btn--sm" data-approve-terminate="${p.partner_id}" style="background:#fee2e2;border-color:#fecaca;color:#b91c1c;">契約終了を承認</button>
          `}
        </div>
      </div>`;
  }

  async function loadInvitations() {
    const el = document.getElementById('invitationsContent');
    el.innerHTML = '<p class="muted">読み込み中…</p>';
    try {
      const r = await AdaptAPI.call('/api/admin/partner-invitations');
      const list = r.invitations || [];
      if (list.length === 0) {
        el.innerHTML = `<p class="muted">発行済みの招待はありません。右上の「＋ Master Resellerを招待」から発行してください。</p>`;
        return;
      }
      el.innerHTML = `
        <table>
          <thead><tr>
            <th>招待先メール</th><th>種別</th><th>招待元</th><th>契約月数</th>
            <th>按分率</th><th>状態</th><th>期限</th><th>結果</th><th>操作</th>
          </tr></thead>
          <tbody>
            ${list.map(inv => {
              const statusBadge = {
                issued: '<span class="status-badge status-pending">発行中</span>',
                accepted: '<span class="status-badge status-active">受付済</span>',
                expired: '<span class="status-badge status-expired">期限切れ</span>',
                revoked: '<span class="status-badge status-expired">取消</span>'
              }[inv.status] || inv.status;
              const expiresSoon = inv.status === 'issued' && new Date(inv.expires_at) < new Date(Date.now() + 2 * 86400000);
              return `
                <tr>
                  <td>${Adapt.escapeHTML(inv.invited_email)}</td>
                  <td>${inv.invited_role === 'super' ? 'Master Reseller' : 'Reseller'}</td>
                  <td>${inv.parent_company_name ? Adapt.escapeHTML(inv.parent_company_name) : '<span class="muted">タムジ社</span>'}</td>
                  <td class="mono">${inv.initial_contract_months}ヶ月</td>
                  <td class="mono">${inv.initial_revenue_share_pct != null ? inv.initial_revenue_share_pct + '%' : '-'}</td>
                  <td>${statusBadge}</td>
                  <td class="mono" ${expiresSoon ? 'style="color:#b91c1c;"' : ''}>${new Date(inv.expires_at).toLocaleDateString('ja-JP')}${expiresSoon ? ' ⚠' : ''}</td>
                  <td>${inv.resulted_company_name ? Adapt.escapeHTML(inv.resulted_company_name) : '-'}</td>
                  <td>
                    ${inv.status === 'issued' ? `
                      <button class="btn btn--sm" data-resend="${inv.id}"${(inv.resend_count || 0) >= 5 ? ' disabled' : ''}>再送(${inv.resend_count || 0})</button>

          try {
            const r = await AdaptAPI.call(`/api/admin/partner-invitations/${btn.dataset.resend}/resend`, { method: 'POST' });

            loadInvitations();
          } catch (e) {
            const m = { resend_limit_reached: '再送上限（5回）に達しています', invalid_status: '発行中の招待のみ再送可能です' };
            Adapt.toast(m[e.message] || '再送失敗: ' + e.message, 'error');
          }
        });
      });
      el.querySelectorAll('[data-revoke]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('招待を取り消します。このURLは使用できなくなります。よろしいですか？')) return;
          try {
            await AdaptAPI.call(`/api/admin/partner-invitations/${btn.dataset.revoke}`, { method: 'DELETE' });

            loadInvitations();
          } catch (e) {
            Adapt.toast('取消失敗: ' + e.message, 'error');
          }
        });
      });
    } catch (e) {
      el.innerHTML = `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  }

  // Phase 4-4: 通知送信タブ

  let _notifyTabInitialized = false;
  async function initNotifyTab() {
    if (!_notifyTabInitialized) {
      _notifyTabInitialized = true;

      const scopeSel = document.getElementById('ntScope');
      scopeSel.addEventListener('change', async () => {
        const field = document.getElementById('ntIndividualField');
        const isIndiv = scopeSel.value === 'individual';
        field.style.display = isIndiv ? '' : 'none';
        if (isIndiv) await loadIndividualPartnerList();
      });

      document.getElementById('notifyForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const msgEl = document.getElementById('notifyMsg');
        const btn = document.getElementById('ntSubmit');
        msgEl.innerHTML = '';

        const scope = scopeSel.value;
        const title = document.getElementById('ntTitle').value.trim();
        const body = document.getElementById('ntBody').value;
        const action_url = document.getElementById('ntActionUrl').value.trim();
        const priority = document.getElementById('ntPriority').value;

        if (!title) {
          msgEl.innerHTML = `<div class="msg msg--err">タイトルを入力してください</div>`;
          return;
        }
        if (!body.trim()) {
          msgEl.innerHTML = `<div class="msg msg--err">本文を入力してください</div>`;
          return;
        }

        const payload = { title, body, priority, action_url: action_url || null };
        if (scope === 'individual') {
          const checked = Array.from(document.querySelectorAll('#ntIndividualList input:checked')).map(x => x.value);
          if (checked.length === 0) {
            msgEl.innerHTML = `<div class="msg msg--err">宛先を1件以上選択してください</div>`;
            return;
          }
          payload.partner_ids = checked;
        } else {
          payload.broadcast_scope = scope;
        }

        // 確認ダイアログ
        const recipientDesc = scope === 'all_active' ? '全稼働中Reseller'
                            : scope === 'all_supers' ? '全Master Reseller'
                            : `選択した${payload.partner_ids?.length || 0}件`;
        if (!confirm(`${recipientDesc}に通知を送信します。よろしいですか？\n\nタイトル: ${title}`)) return;

        btn.disabled = true;
        btn.textContent = '送信中…';
        try {
          const r = await AdaptAPI.call('/api/admin/notify', { method: 'POST', body: payload });
          msgEl.innerHTML = `<div class="msg msg--ok">${r.sent_count}件のResellerに送信しました</div>`;
          Adapt.toast(`通知を ${r.sent_count}件送信しました`, 'success');
          // フォームリセット
          document.getElementById('ntTitle').value = '';
          document.getElementById('ntBody').value = '';
          document.getElementById('ntActionUrl').value = '';
          document.getElementById('ntPriority').value = 'normal';
          scopeSel.value = 'all_active';
          document.getElementById('ntIndividualField').style.display = 'none';
          loadNotifyHistory();
        } catch (e) {
          const map = {
            missing_recipients: '宛先が指定されていません',
            no_valid_recipients: '有効な宛先が見つかりません',
            invalid_title: 'タイトルが不正です（200字以内）',
            invalid_body: '本文が不正です（5000字以内）',
            invalid_action_url: 'アクションURLが不正です（500字以内）'
          };
          msgEl.innerHTML = `<div class="msg msg--err">${map[e.message] || 'エラー: ' + e.message}</div>`;
        } finally {
          btn.disabled = false;
          btn.textContent = '送信';
        }
      });
    }
    loadNotifyHistory();
  }

  // =====================================================
  // Phase 4-3a: 按分率編集・履歴モーダル
  // admin モード = /api/admin/partners/:id/share[-history]
  // =====================================================
  function getModalWrap() {
    let wrap = document.getElementById('shareModalWrap');
    if (!wrap) {
      wrap = document.createElement('div');
      wrap.id = 'shareModalWrap';
      document.body.appendChild(wrap);
    }
    return wrap;
  }
  function closeShareModal() {
    const wrap = document.getElementById('shareModalWrap');
    if (wrap) wrap.innerHTML = '';
  }
  function todayYMD() {
    const d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth() + 1).padStart(2, '0') + '-' +
      String(d.getDate()).padStart(2, '0');
  }
  function firstOfNextMonthYMD() {
    const d = new Date();
    const y = d.getMonth() === 11 ? d.getFullYear() + 1 : d.getFullYear();
    const m = d.getMonth() === 11 ? 1 : d.getMonth() + 2;
    return y + '-' + String(m).padStart(2, '0') + '-01';
  }

  async function openShareEditModal({ partnerId, companyName, currentPct }) {
    const wrap = getModalWrap();
    wrap.innerHTML = `

              <textarea id="shareNote" rows="2" maxlength="500" placeholder="例: 契約更新に伴う引き上げ"></textarea>
            </div>

              <button type="button" class="btn" id="shareEditCancel">キャンセル</button>

            </div>
          </form>
        </div>
      </div>`;
    document.getElementById('shareBackdrop').addEventListener('click', e => {
      if (e.target.id === 'shareBackdrop') closeShareModal();
    });

    document.getElementById('shareEditForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const msgEl = document.getElementById('shareEditMsg');
      const submitBtn = document.getElementById('shareEditSubmit');
      msgEl.innerHTML = '';

      const pct = Number(document.getElementById('newPct').value);
      const effFrom = document.getElementById('effFrom').value;
      const note = document.getElementById('shareNote').value;
      if (Number.isNaN(pct) || pct < 0 || pct > 100) {
        msgEl.innerHTML = `<div class="msg msg--err">按分率は 0〜100 の数値を入力してください。</div>`;

        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = '保存中…';

        const r = await AdaptAPI.call(`/api/admin/partners/${partnerId}/share`, {
          method: 'POST',
          body: { pct, effective_from: effFrom, note }
        });
        let toastMsg = `按分率を ${r.pct}% に変更しました（発効: ${r.effective_from}）`;
        if (r.retroactive_adjustments && r.retroactive_adjustments.length) {
          toastMsg += `／遡及再計算 ${r.retroactive_adjustments.length} 件`;
        }
        if (r.paid_entries_protected) {
          toastMsg += `／支払済 ${r.paid_entries_protected} 件は保護`;
        }
        Adapt.toast(toastMsg, 'success');
        closeShareModal();
        loadPartners();

        const errMap = {
          invalid_pct: '按分率が不正です（0〜100・小数点第一位まで）',
          invalid_date: '発効日が不正です',
          note_too_long: '備考は500文字以内で入力してください',
          effective_before_contract: '発効日は契約開始日以降を指定してください',
          not_super: '対象はMaster Resellerのみです',
          partner_not_found: '対象が見つかりません'

        submitBtn.disabled = false;
        submitBtn.textContent = '変更を保存';
      }
    });
  }

        <section>
          <h4 style="margin:0 0 8px 0;font-size:13px;color:#c4432b;">
            ご紹介先企業（${customers.length}）
            ${p.type === 'super' ? '<span style="font-size:11px;color:#666;font-weight:normal;margin-left:8px;">※直販＋Reseller経由の合算</span>' : ''}
          </h4>
          ${customers.length === 0 ? '<p class="muted">ご紹介先企業はまだいません。</p>' : `
          <div style="max-height:240px;overflow-y:auto;">
          <table style="font-size:12px;">
            <thead><tr>
              <th>会社ID</th><th>会社名</th><th>パートナーコード</th><th>スタッフ</th><th>有料契約</th><th>登録日</th>
            </tr></thead>
            <tbody>
              ${customers.map(cu => `
                <tr>
                  <td class="mono">${Adapt.escapeHTML(cu.company_id)}</td>
                  <td>${Adapt.escapeHTML(cu.name)}</td>
                  <td class="mono" ${cu.partner_code === p.code ? 'style="color:#c4432b;font-weight:700;"' : ''}>${Adapt.escapeHTML(cu.partner_code || '-')}${cu.partner_code === p.code ? ' <span style="font-size:10px;font-weight:normal;">（直販）</span>' : ''}</td>
                  <td class="mono">${cu.staff_count}</td>
                  <td class="mono">${cu.active_subs}</td>
                  <td class="mono">${formatDate(cu.created_at)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          </div>`}
        </section>
      `;
    } catch (e) {
      document.getElementById('detailContent').innerHTML =
        `<div class="msg msg--err">取得失敗: ${Adapt.escapeHTML(e.message)}</div>`;
    }
  }
})();
</script>
</body>
</html>
