<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>アカウント｜Adavoo</title>
<link rel="stylesheet" href="assets/style.css?v=20260421" />
</head>
<body>
<div id="adapt-header"></div>

<main class="container">
  <section class="page-intro">
    <p class="section-label">Account</p>
    <h1>アカウント</h1>
    <p>プロフィール・モジュール連携・セキュリティ設定</p>
  </section>

  <div class="stack">

    <section class="card">
      <h2 class="panel-title">プロフィール</h2>
      <table id="profileTbl"></table>
    </section>

    <section class="card">
      <h2 class="panel-title">Resellerコード</h2>
      <div id="partnerCodeContent"></div>
    </section>

    <section class="card">
      <h2 class="panel-title">連携済みモジュール</h2>
      <div id="linksContent"></div>
    </section>

    <section class="card">
      <h2 class="panel-title">パスワード変更</h2>
      <div id="pwMsg"></div>
      <form id="pwForm" class="stack" style="max-width:440px;">
        <div class="field">
          <label for="oldPw">現在のパスワード</label>
          <div class="pw-wrap">
            <input id="oldPw" type="password" required autocomplete="current-password" />
            <button type="button" class="pw-toggle" data-pw="oldPw">表示</button>
          </div>
        </div>
        <div class="field">
          <label for="newPw">新しいパスワード</label>
          <div class="pw-wrap">
            <input id="newPw" type="password" required minlength="8" autocomplete="new-password" />
            <button type="button" class="pw-toggle" data-pw="newPw">表示</button>
          </div>
          <div class="hint">8文字以上</div>
        </div>
        <div>
          <button class="btn btn--primary" id="pwBtn" type="submit">変更する</button>
        </div>
      </form>
    </section>

  </div>
</main>

<script src="assets/common.js?v=20260421"></script>
<script>
(async function () {
  const session = await Adapt.requireLogin('login.html');
  if (!session) return;
  Adapt.renderHeader({ loggedIn: true, active: 'account' });
  Adapt.bindPasswordToggles();

  const u = session.user;
  const c = session.company || {};
  document.getElementById('profileTbl').innerHTML = `
    <tr><th style="width:180px">ログインID</th><td class="mono">${Adapt.escapeHTML(u.login_id)}</td></tr>
    <tr><th>スタッフID</th><td class="mono">${Adapt.escapeHTML(u.staff_id)}</td></tr>
    <tr><th>氏名</th><td>${Adapt.escapeHTML(u.name)}</td></tr>
    <tr><th>メール</th><td>${Adapt.escapeHTML(u.email || '-')}</td></tr>
    <tr><th>ロール</th><td class="mono">${Adapt.escapeHTML(u.role)}</td></tr>
    <tr><th>会社ID</th><td class="mono">${Adapt.escapeHTML(c.company_id || u.master_company_id)}</td></tr>
    <tr><th>会社名</th><td>${Adapt.escapeHTML(c.name || '-')}</td></tr>
  `;

  // ---------- Resellerコードセクション ----------
  renderPartnerCode(c);

  function renderPartnerCode(company) {
    const el = document.getElementById('partnerCodeContent');
    const locked = company && company.partner_code_locked_at;
    const code = company && company.partner_code;

    if (locked && code) {
      // 確定済み：表示のみ（変更不可）
      el.innerHTML = `
        <table>
          <tr><th style="width:180px">紐付けコード</th><td class="mono">${Adapt.escapeHTML(code)}</td></tr>
          <tr><th>確定日時</th><td class="mono">${formatDate(locked)}</td></tr>
        </table>
        <p class="muted" style="margin-top:10px; font-size:12px;">
          Resellerコードは一度確定すると変更できません。
        </p>
      `;
      return;
    }

    // 未確定：1回のみ入力可
    el.innerHTML = `
      <p class="muted" style="margin-bottom:12px;">
        Resellerから案内されたコードがある場合のみ入力してください。<br>
        <strong>入力後は変更できません。</strong>未入力のままでも問題ありません（タムジ直販として扱われます）。
      </p>
      <div id="pcMsg"></div>
      <form id="pcForm" class="stack" style="max-width:440px;">
        <div class="field">
          <label for="pcInput">Resellerコード</label>
          <input id="pcInput" type="text" autocomplete="off" maxlength="10"
                 style="text-transform:uppercase;"
                 placeholder="例: SUP-000001 / AGT-000001" />
          <div class="hint">形式：SUP-XXXXXX（Master Reseller）または AGT-XXXXXX（Reseller）</div>
        </div>
        <div>
          <button class="btn btn--primary" id="pcBtn" type="submit">紐付ける</button>
        </div>
      </form>
    `;
    const pcForm = document.getElementById('pcForm');
    const pcMsg  = document.getElementById('pcMsg');
    const pcBtn  = document.getElementById('pcBtn');
    pcForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      pcMsg.innerHTML = '';
      const val = document.getElementById('pcInput').value.trim().toUpperCase();
      if (!val) { pcMsg.innerHTML = '<div class="msg msg--err">Resellerコードを入力してください。</div>'; return; }
      if (!confirm(val + ' を紐付けます。\n一度確定すると変更できません。よろしいですか？')) return;
      pcBtn.disabled = true;
      pcBtn.textContent = '送信中…';
      try {
        const r = await AdaptAPI.call('/api/company/claim-partner-code', {
          method: 'POST',
          body: { partner_code: val }
        });
        // 成功：セッションのcompany情報を更新表示に差し替え
        const updated = Object.assign({}, company || {}, {
          partner_code: r.partner_code,
          partner_code_locked_at: r.partner_code_locked_at
        });
        renderPartnerCode(updated);
        Adapt.toast('Resellerコードを紐付けました', 'success');
      } catch (err) {
        const map = {
          invalid_partner_code_format: 'Resellerコードの形式が正しくありません（SUP-XXXXXX / AGT-XXXXXX）。',
          partner_code_not_found: '入力されたResellerコードは存在しません。',
          partner_code_inactive: 'このResellerコードは現在利用できません。',
          partner_code_already_locked: 'すでにResellerコードが紐付け済みです。',
          missing_fields: 'Resellerコードを入力してください。'
        };
        pcMsg.innerHTML = `<div class="msg msg--err">${map[err.message] || 'エラー: ' + err.message}</div>`;
      } finally {
        pcBtn.disabled = false;
        pcBtn.textContent = '紐付ける';
      }
    });
  }

  const linksContent = document.getElementById('linksContent');
  try {
    const r = await AdaptAPI.call('/api/apps/links');
    const links = r.links || [];
    if (links.length === 0) {
      linksContent.innerHTML = `
        <p class="muted" style="margin-bottom:12px;">まだ連携がありません。ホーム画面の各アプリカードから「連携する」を押してください。</p>
        <a class="btn btn--dark btn--sm" href="index.html">ホームへ</a>
      `;
    } else {
      linksContent.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>アプリ</th><th>子ログインID</th><th>会社コード</th>
              <th>ロール</th><th>紐付け日</th><th>最終SSO</th><th></th>
            </tr>
          </thead>
          <tbody>
            ${links.map(l => `
              <tr>
                <td>${l.app_name}</td>
                <td class="mono">${Adapt.escapeHTML(l.child_login_id)}</td>
                <td class="mono">${Adapt.escapeHTML(l.child_company_code || '-')}</td>
                <td class="mono">${Adapt.escapeHTML(l.child_role || '-')}</td>
                <td class="mono">${formatDate(l.linked_at)}</td>
                <td class="mono">${l.last_sso_at ? formatDate(l.last_sso_at) : '-'}</td>
                <td><button class="btn btn--ghost btn--sm" data-unlink="${l.id}">解除</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      linksContent.addEventListener('click', async (e) => {
        const b = e.target.closest('button[data-unlink]');
        if (!b) return;
        if (!confirm('連携を解除しますか？')) return;
        try {
          await AdaptAPI.call('/api/apps/links/' + b.dataset.unlink, { method: 'DELETE' });
          location.reload();
        } catch (err) { Adapt.toast('解除失敗: ' + err.message, 'error'); }
      });
    }
  } catch (e) {
    linksContent.innerHTML = `<div class="msg msg--err">取得失敗: ${e.message}</div>`;
  }

  const pwForm = document.getElementById('pwForm');
  const pwMsg = document.getElementById('pwMsg');
  const pwBtn = document.getElementById('pwBtn');
  pwForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    pwMsg.innerHTML = '';
    pwBtn.disabled = true;
    pwBtn.textContent = '変更中…';
    try {
      await AdaptAPI.call('/api/auth/change-password', {
        method: 'POST',
        body: {
          old_password: document.getElementById('oldPw').value,
          new_password: document.getElementById('newPw').value
        }
      });
      pwMsg.innerHTML = '<div class="msg msg--ok">パスワードを変更しました。</div>';
      pwForm.reset();
    } catch (err) {
      const map = {
        wrong_password: '現在のパスワードが違います。',
        password_too_short: 'パスワードは8文字以上にしてください。'
      };
      pwMsg.innerHTML = `<div class="msg msg--err">${map[err.message] || 'エラー: ' + err.message}</div>`;
    } finally {
      pwBtn.disabled = false;
      pwBtn.textContent = '変更する';
    }
  });

  function formatDate(s) {
    if (!s) return '';
    const d = new Date(s.replace(' ', 'T') + (s.endsWith('Z') ? '' : 'Z'));
    if (isNaN(d)) return s;
    return d.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  }
})();
</script>
</body>
</html>
