<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>ログイン｜Adavoo</title>
<link rel="stylesheet" href="assets/style.css?v=20260422" />
</head>
<body>
<div id="adapt-header"></div>

<main class="auth-wrap">
  <div style="max-width:480px;margin:0 auto 16px auto;">
    <a href="lp.html" class="btn btn--ghost btn--sm">← Adavoo LPに戻る</a>
  </div>
  <section class="auth-card">
    <h1 class="auth-title">ログイン</h1>
    <p class="auth-sub">Adavoo / Sign in</p>

    <div id="msg"></div>

    <form id="loginForm" class="stack" autocomplete="on" novalidate>
      <div class="field">
        <label for="loginId">ログインID</label>
        <input id="loginId" name="login_id" type="text" autocomplete="username" required />
        <div class="hint">半角英数字・<code>-</code>・<code>_</code></div>
      </div>
      <div class="field">
        <label for="password">パスワード</label>
        <div class="pw-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" data-pw="password">表示</button>
        </div>
      </div>
      <button class="btn btn--primary btn--block" id="submitBtn" type="submit">ログイン</button>
    </form>

    <div class="auth-footer">
      <a href="forgot-password.html" style="font-size:13px;">パスワードをお忘れですか？</a><br>
      <span style="margin-top:8px; display:inline-block;">アカウントをお持ちでない場合 <a href="register.html">新規登録</a></span>
    </div>
  </section>
</main>

<script src="assets/common.js?v=20260422"></script>
<script>
  Adapt.renderHeader({ loggedIn: false });
  Adapt.bindPasswordToggles();

  // 既ログインチェック（どちらのセッションでも有効なら対応する画面へ）
  // 1. master_staff トークンがあれば /api/auth/me で検証 → index.html
  // 2. なければ partner トークンがあれば /api/partner/me で検証 → partner-dashboard.html
  (async function checkExistingSession() {
    if (AdaptAPI.token()) {
      try {
        await AdaptAPI.call('/api/auth/me');
        location.href = 'index.html';
        return;
      } catch {
        AdaptAPI.clear();
      }
    }
    if (PartnerAPI.token()) {
      try {
        await PartnerAPI.call('/api/partner/me');
        location.href = 'partner-dashboard.html';
        return;
      } catch {
        PartnerAPI.clear();
      }
    }
  })();

  const form = document.getElementById('loginForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'ログイン中…';
    try {
      // 統合ログイン: /api/auth/login が master_staff / partner 両方を受け付ける
      // 認証ヘッダを送らないよう AdaptAPI.call を使う（ただし成功時のトークン保存先は
      // レスポンスの user_type によって分岐する）
      const data = await AdaptAPI.call('/api/auth/login', {
        method: 'POST',
        body: {
          login_id: document.getElementById('loginId').value.trim(),
          password: document.getElementById('password').value
        }
      });

      if (data.user_type === 'partner') {
        // Resellerとして認証成功 → PartnerAPI にトークン保存
        PartnerAPI.setToken(data.token, data.expires_at);
        PartnerAPI.setPartner(data.partner);
        location.href = 'partner-dashboard.html';
      } else {
        // デフォルト: master_staff として認証成功
        AdaptAPI.setToken(data.token, data.expires_at);
        AdaptAPI.setUser(data.user);
        location.href = 'index.html';
      }
    } catch (e) {
      const map = {
        invalid_credentials: 'ログインIDまたはパスワードが違います。',
        pending_verification: 'メール確認が未完了です。登録時に送信されたメールのボタンを押してください。',
        account_suspended: 'このアカウントは停止されています。',
        partner_suspended: 'このResellerアカウントは現在利用できません（契約終了・停止等）。',
        missing_fields: '入力を確認してください。'
      };
      msg.innerHTML = `<div class="msg msg--err">${map[e.message] || 'エラー: ' + e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'ログイン';
    }
  });
</script>
</body>
</html>
