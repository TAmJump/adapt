<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>新規登録｜Adapt</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<div id="adapt-header"></div>

<main class="auth-wrap">
  <section class="auth-card" style="max-width:520px;">
    <h1 class="auth-title">新規アカウント登録</h1>
    <p class="auth-sub">ADAPT / REGISTER</p>

    <p class="muted" style="margin:0 0 24px 0;">
      Adaptアカウントを作成すると、OneTouchAdapt・MedAdapt などの子アプリに
      同じIDでログインできるようになります（紐付けは登録後のアカウントページから）。
    </p>

    <div id="msg"></div>

    <form id="regForm" class="stack" autocomplete="on">
      <div class="field">
        <label for="companyName">会社名・法人名 <span style="color:var(--seal)">*</span></label>
        <input id="companyName" type="text" required maxlength="120" />
      </div>
      <div class="row" style="gap:12px;">
        <div class="field" style="flex:1;margin-bottom:16px;">
          <label for="email">メールアドレス</label>
          <input id="email" type="email" />
        </div>
        <div class="field" style="flex:1;margin-bottom:16px;">
          <label for="phone">電話番号</label>
          <input id="phone" type="tel" />
        </div>
      </div>
      <div class="field">
        <label for="name">管理者氏名 <span style="color:var(--seal)">*</span></label>
        <input id="name" type="text" required maxlength="60" />
      </div>
      <div class="field">
        <label for="loginId">ログインID <span style="color:var(--seal)">*</span></label>
        <input id="loginId" type="text" required autocomplete="username"
               pattern="[a-zA-Z0-9_\-]{3,40}" />
        <div class="hint">3〜40文字の半角英数字・<code>-</code>・<code>_</code>（例: tamjump-admin）</div>
      </div>
      <div class="field">
        <label for="password">パスワード <span style="color:var(--seal)">*</span></label>
        <input id="password" type="password" required minlength="8" autocomplete="new-password" />
        <div class="hint">8文字以上</div>
      </div>
      <button class="btn btn--primary btn--block" id="submitBtn" type="submit">登録する</button>
    </form>

    <div class="auth-footer">
      すでにアカウントをお持ちの場合 <a href="login.html">ログイン</a>
    </div>
  </section>
</main>

<script src="assets/common.js"></script>
<script>
  Adapt.renderHeader({ loggedIn: false });

  const form = document.getElementById('regForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    msg.innerHTML = '';
    btn.disabled = true;
    btn.textContent = '登録中…';
    try {
      const body = {
        company_name: document.getElementById('companyName').value.trim(),
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim() || undefined,
        phone: document.getElementById('phone').value.trim() || undefined,
        login_id: document.getElementById('loginId').value.trim(),
        password: document.getElementById('password').value
      };
      const data = await AdaptAPI.call('/api/auth/register', { method: 'POST', body });
      // 登録後そのままログイン
      const lg = await AdaptAPI.call('/api/auth/login', {
        method: 'POST',
        body: { login_id: body.login_id, password: body.password }
      });
      AdaptAPI.setToken(lg.token, lg.expires_at);
      AdaptAPI.setUser(lg.user);
      location.href = 'index.html?welcome=1';
    } catch (e) {
      const map = {
        login_id_taken: 'このログインIDは既に使われています。',
        password_too_short: 'パスワードは8文字以上にしてください。',
        invalid_login_id: 'ログインIDは3〜40文字の半角英数字・- _ で入力してください。',
        missing_fields: '必須項目を入力してください。'
      };
      msg.innerHTML = `<div class="msg msg--err">${map[e.message] || 'エラー: ' + e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = '登録する';
    }
  });
</script>
</body>
</html>
